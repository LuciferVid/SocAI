version: "1"

services:
  # 1. FastAPI Dashboard & API (Web Service)
  - type: web
    name: soc-api
    env: python
    region: ohio
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: MESSAGING_TYPE
        value: redis
      - key: DATABASE_URL
        fromDatabase:
          name: soc_db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: soc-redis
          property: connectionString

  # 2. Log Generator & ML Processor (Background Worker)
  - type: worker
    name: soc-worker
    env: python
    region: ohio
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "python -m generator.sensor_agent"
    envVars:
      - key: MESSAGING_TYPE
        value: redis
      - key: REDIS_URL
        fromService:
          type: redis
          name: soc-redis
          property: connectionString

  # 3. Redis Message Broker
  - type: redis
    name: soc-redis
    region: ohio
    plan: free
    ipAllowList: [] # internal only

databases:
  # 4. PostgreSQL Database
  - name: soc_db
    region: ohio
    plan: free
    databaseName: socai
    user: socadmin
